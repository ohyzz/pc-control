<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">

<title>Scripts</title>

<style>

/* grid */

.scripts-grid{

display:grid;
grid-template-columns:1fr 1fr;

gap:16px;

margin:16px;

}

/* card */

.script-card{

height:120px;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

gap:8px;

border-radius:18px;

cursor:pointer;

}

/* press animation */

.script-card:active{

transform:scale(.93);

}

/* icon */

.script-icon{

font-size:26px;

}

/* label */

.script-label{

font-size:13px;

}

/* last button full width */

.script-full{

grid-column:1 / 3;

}

#script-status{

text-align:center;
font-size:11px;
opacity:.6;

}

</style>

</head>

<body>

<div class="app">

<div class="machine-header">

<p class="machine-label">REMOTE</p>
<p class="machine-name">SCRIPTS</p>

</div>


<div class="scripts-grid">


<div class="script-card glass-bright" onclick="runScript('dev')">

<div class="script-icon">💻</div>
<div class="script-label">Dev Workspace</div>

</div>


<div class="script-card glass-bright" onclick="runScript('update')">

<div class="script-icon">⚡</div>
<div class="script-label">Update System</div>

</div>


<div class="script-card glass-bright script-full" onclick="runScript('lock')">

<div class="script-icon">🔒</div>
<div class="script-label">Lock PC</div>

</div>


</div>


<div id="script-status"></div>

</div>


<nav class="nav-bar">

<div class="nav-pill">

<div class="nav-item" onclick="location.href='/'">
    <div class="nav-icon"></div>
<span class="nav-label">HOME</span>
</div>

<div class="nav-item" onclick="location.href='/files'">
    <div class="nav-icon"></div>
<span class="nav-label">FILES</span>
</div>

<div class="nav-item" onclick="location.href='/shell'">
    <div class="nav-icon"></div>
<span class="nav-label">SHELL</span>
</div>

<div class="nav-item">
    <div class="nav-icon active"></div>
<span class="nav-label active">SCRIPTS</span>
</div>

</div>

</nav>


<script>

async function runScript(name){

 const status = document.getElementById("script-status")

 status.innerText = "Running..."

 await fetch(`/script/${name}`)

 status.innerText = "✓ Done"

 setTimeout(()=>{
  status.innerText = ""
 },2000)

}

</script>

</body>

</html>
